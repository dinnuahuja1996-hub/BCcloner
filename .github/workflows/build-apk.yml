name: Build APK

  on:
    push:
      branches: [ main ]
    workflow_dispatch:

  jobs:
    build:
      runs-on: ubuntu-latest

      steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Set up JDK 17
          uses: actions/setup-java@v4
          with:
            java-version: '17'
            distribution: 'temurin'

        - name: Setup Android SDK
          uses: android-actions/setup-android@v3

        - name: Setup Gradle 8.9
          uses: gradle/actions/setup-gradle@v4
          with:
            gradle-version: '8.9'

        - name: Show environment info
          run: |
            echo "ANDROID_HOME=$ANDROID_HOME"
            echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
            gradle --version
            java -version
            ls -la
            ls -la app/ || echo "No app/ folder"

        - name: Accept SDK licenses
          run: yes | sdkmanager --licenses 2>/dev/null || true

        - name: Install SDK components
          run: sdkmanager "platforms;android-35" "build-tools;35.0.0" || true

        - name: Build Debug APK
          run: gradle assembleDebug --no-daemon --info 2>&1 | tee /tmp/build.log; exit ${PIPESTATUS[0]}

        - name: Find APK
          if: always()
          run: find . -name "*.apk" 2>/dev/null || echo "No APK found"

        - name: Upload APK
          if: success()
          uses: actions/upload-artifact@v4
          with:
            name: PlayBBTool-debug-apk
            path: app/build/outputs/apk/debug/*.apk
            retention-days: 30

        - name: Upload build log (on failure)
          if: failure()
          uses: actions/upload-artifact@v4
          with:
            name: build-log
            path: /tmp/build.log
            retention-days: 7
  