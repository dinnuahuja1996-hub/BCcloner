name: Build APK

  on:
    push:
      branches: [ main ]
    workflow_dispatch:

  jobs:
    build:
      runs-on: ubuntu-latest

      steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Set up JDK 17
          uses: actions/setup-java@v4
          with:
            java-version: '17'
            distribution: 'temurin'

        - name: Install Gradle 8.9
          run: |
            wget -q https://services.gradle.org/distributions/gradle-8.9-bin.zip
            unzip -q gradle-8.9-bin.zip
            echo "$GITHUB_WORKSPACE/gradle-8.9/bin" >> $GITHUB_PATH

        - name: Setup Android SDK
          uses: android-actions/setup-android@v3

        - name: Accept Android licenses
          run: yes | sdkmanager --licenses || true

        - name: Install Android build tools
          run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

        - name: Build Debug APK
          env:
            ANDROID_HOME: /usr/local/lib/android/sdk
          run: gradle assembleDebug --no-daemon --stacktrace

        - name: Find APK
          run: find . -name "*.apk" 2>/dev/null

        - name: Upload APK
          uses: actions/upload-artifact@v4
          with:
            name: PlayBBTool-debug-apk
            path: app/build/outputs/apk/debug/*.apk
            retention-days: 30
  