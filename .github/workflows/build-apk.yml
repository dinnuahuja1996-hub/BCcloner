name: Build APK

  on:
    push:
      branches: [ main ]
    workflow_dispatch:

  jobs:
    build:
      runs-on: ubuntu-latest

      steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Set up JDK 17
          uses: actions/setup-java@v4
          with:
            java-version: '17'
            distribution: 'temurin'

        - name: Setup Android SDK
          uses: android-actions/setup-android@v3

        - name: Install SDK platform and tools
          run: |
            sdkmanager "platforms;android-35" "build-tools;35.0.0"

        - name: Setup Gradle 8.9
          uses: gradle/actions/setup-gradle@v4
          with:
            gradle-version: '8.9'

        - name: Build Debug APK
          run: gradle assembleDebug --no-daemon --stacktrace 2>&1 | tail -100

        - name: Find APK
          run: find . -name "*.apk" 2>/dev/null || echo "No APK found"

        - name: Upload APK
          if: success()
          uses: actions/upload-artifact@v4
          with:
            name: PlayBBTool-debug-apk
            path: app/build/outputs/apk/debug/*.apk
            retention-days: 30
  