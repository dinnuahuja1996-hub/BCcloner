name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle 8.9
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.9-bin.zip -O /tmp/g.zip
          unzip -q /tmp/g.zip -d /opt

      - name: Check Android SDK
        run: |
          echo "SDK: $ANDROID_SDK_ROOT"
          ls $ANDROID_SDK_ROOT/platforms/ || echo 'no platforms dir'
          ls $ANDROID_SDK_ROOT/build-tools/ || echo 'no build-tools dir'
          echo "Available platforms: $(ls $ANDROID_SDK_ROOT/platforms/ 2>/dev/null)"
          echo "Available build-tools: $(ls $ANDROID_SDK_ROOT/build-tools/ 2>/dev/null)"

      - name: Build Debug APK
        run: /opt/gradle-8.9/bin/gradle assembleDebug --no-daemon --stacktrace 2>&1
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: app/build/outputs/apk/debug/
          if-no-files-found: warn
